{% extends 'base.html' %}

{% block content %}
<div class="flex flex-col items-center mt-10">
    <h1 class="text-2xl mb-6">Are you sure you want to delete "{{ animal.name }}"?</h1>

    <form class="flex flex-col items-center align-center" method="post">
        <div class="flex flex-col ">
            {% csrf_token %}
            {% for field in form %}
            {{ field.help_text }}
            <div class="flex flex-col mb-2">
                    <div class="w-60">
                        {{ field }}
                    </div>
            </div>
            {% endfor %}
            <div class="flex gap-4 mt-4 mb-4">
                <button type="submit" class="border rounded-sm px-6 py-2 bg-red-500 hover:bg-red-600 text-white">
                    Yes, Delete
                </button>
                <a href="{% url 'animal_detail' animal.slug %}" class="border rounded-sm px-6 py-2 bg-slate-300 hover:bg-slate-400">
                    Cancel
                </a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
