{% extends 'base.html' %}

{% block content %}
    <div class="flex justify-center mt-6 mb-4">
        <a class="mt-5 text-xl border rounded-sm bg-slate-300 hover:bg-slate-400 w-50 text-center p-2" href="{% url 'add_animal' %}">Add Animal</a>
    </div>
    <div class="flex flex-col items-center">
            {% for animal in animals %}
            <div class="flex border w-3xl rounded-sm justify-between items-center p-2 m-2 bg-white">
                <a class="text-xl underline hover:text-blue-800" href="{% url 'animal_detail' animal.slug %}">{{ animal.name }}</a>
                <div class="flex gap-2">
                    <a href="{% url 'edit_animal' animal.slug %}" class="flex items-center justify-center border border-black rounded-sm  h-10 w-18 bg-blue-500 hover:bg-blue-600 text-white">
                        Edit
                    </a>
                    <a href="{% url 'delete_animal' animal.slug %}" class="flex items-center justify-center border border-black rounded-sm h-10 w-18 bg-red-500 hover:bg-red-600 text-white">
                        Delete
                    </a>
                </div>
            </div>
            {% endfor %}
    </div>
{% endblock %}
