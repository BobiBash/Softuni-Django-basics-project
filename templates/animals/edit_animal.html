{% extends 'base.html' %}

{% block content %}
        <h1 class="flex justify-center align-center text-2xl mb-6">Edit Animal</h1>

        <form class="flex flex-col items-center align-center" method="post">
            <div class="flex flex-col items-center">
                {% csrf_token %}
                {% for field in form %}
                {{ field.help_text }}
                <div class="flex flex-col mb-2">
                        <div class="w-60">
                            {{ field }}
                        </div>
                </div>
                {% endfor %}
                <div class="flex gap-2 mt-4 mb-4">
                    <button class="border rounded-sm p-2 bg-slate-300 hover:bg-slate-400" type="submit">Save Changes</button>
                    <a href="{% url 'animals_list' %}" class="border rounded-sm p-2 bg-slate-300 hover:bg-slate-400">Cancel</a>
                </div>
            </div>
        </form>


{% endblock %}
